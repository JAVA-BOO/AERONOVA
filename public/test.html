<!DOCTYPE html>
<html class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkyWay Travels - Dashboard</title>

    <link href="./output.css" rel="stylesheet" />

    <!-- firebase -->
    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-auth-compat.js"></script>

    <!-- google fonts link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink:wght@100..900&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Manrope:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />

    <style>
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }
      body {
        font-family: "Manrope", sans-serif;
      }
      h1,
      h2,
      h3 {
        font-family: "Plus Jakarta Sans", sans-serif;
      }
      .skeleton {
        background: #e5e7eb;
        border-radius: 8px;
        animation: pulse 1.5s infinite;
      }

      .title {
        height: 30px;
        width: 300px;
        margin-bottom: 20px;
      }

      .card {
        height: 150px;
        margin-bottom: 15px;
      }

      @keyframes pulse {
        0% {
          opacity: 0.6;
        }
        50% {
          opacity: 1;
        }
        100% {
          opacity: 0.6;
        }
      }
    </style>
  </head>

  <body class="">
    <aside
      class="fixed duration-300 ease-in top-0 z-50 rounded-4xl"
      id="menuBar"
    >
      <div class="bg-surface-container-low p-2 rounded-4xl">
        <nav class="flex flex-col">
          <a
            class="flex items-center px-2 py-1 text-on-surface-variant hover:bg-surface-container-high rounded-lg transition-all"
            href="#"
          >
            <span class="material-symbols-outlined" data-icon="person"
              >person</span
            >
            <span>Profile</span>
          </a>
          <div class="h-px bg-outline-variant/20 my-1 mx-2 px-0"></div>
          <a
            class="flex items-center gap-1 px-2 py-3 text-error hover:bg-error-container/20 rounded-lg transition-all"
            href="#"
          >
            <span class="material-symbols-outlined" data-icon="logout"
              >logout</span
            >
            <span>Sign Out</span>
          </a>
        </nav>
      </div>
    </aside>
  </body>
</html>
<script src="./js/dashboard.js"></script>
