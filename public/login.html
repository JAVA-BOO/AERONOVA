<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - SkyWay Travels</title>
    <link href="output.css" rel="stylesheet" />
    <!-- firebase -->
    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-auth-compat.js"></script>

    <!-- google fonts link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink:wght@100..900&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Manrope:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <!-- google icon -->

    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />

    <style>
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
      }
      .editorial-shadow {
        box-shadow: 0 20px 40px rgba(25, 28, 30, 0.04);
      }
    </style>
  </head>
  <body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">
    <!-- glass/transparent Header -->
    <header class="fixed top-0 w-full z-50 bg-white/40 backdrop-blur-md">
      <div
        class="flex justify-between items-center px-6 py-4 w-full max-w-7xl mx-auto"
      >
        <div class="flex items-center gap-2">
          <span
            class="text-2xl font-extrabold font-headline tracking-tighter text-primary"
          >
            <a href="index.html"> SkyWay </a></span
          >
        </div>
        <div class="hidden md:flex items-center gap-6">
          <a
            class="text-on-surface-variant hover:text-primary font-medium transition-colors text-sm"
            href="#"
            >Need help?</a
          >
        </div>
      </div>
    </header>
    <main
      class="flex-grow flex items-center justify-center relative px-4 py-20"
    >
      <!-- Background Element -->
      <div class="absolute inset-0 z-0 overflow-hidden">
        <div
          class="absolute inset-0 bg-gradient-to-tr from-primary/50 via-background to-tertiary-fixed/20"
        ></div>
        <img
          class="w-full h-full object-cover opacity-20 mix-blend-overlay"
          data-alt="Soft aerial view of clouds from airplane window"
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuAqwgkV5N7V9YCFnqYG2GOBQgAF5uLvWhhCSSvc0bPwMhP3qDYw3r_g-83d3IfvZgSuK_7CeOEOgFThep3nptjRR-FTv30iI_MCmTWYtumEFL9tRvPBYOU9JCQ0XJFfL4XX3sDrBGBL0xK3hvu0z6c9pFFgKnRO-f93BavynCHBQZWDzzuvViaviRXyw3I6wU-V2tnjEyNF6uB2rH45HerwScOJG1BjAyjCPm60WexSJUFmIV969ZPqUBVESpU4wYf2BOXCgQyJCJLP"
        />
      </div>
      <!-- Login Card -->
      <div class="relative z-10 w-full max-w-[440px]">
        <div
          class="glass-panel editorial-shadow rounded-xl p-8 md:p-10 border border-white/20"
        >
          <div class="mb-10 text-center">
            <h1
              class="font-headline text-3xl font-extrabold text-on-surface tracking-tight mb-2"
            >
              Welcome Back
            </h1>
            <p class="text-on-surface-variant text-sm">
              Your next adventure begins here.
            </p>
          </div>
          <form class="space-y-6">
            <!-- Email Field -->
            <div class="space-y-2">
              <label
                class="block text-[0.6875rem] font-bold uppercase tracking-wider text-on-surface-variant ml-1"
                for="email"
                >Email Address</label
              >
              <div class="relative">
                <input
                  class="w-full bg-surface-container-lowest border-none rounded-lg px-4 py-3.5 text-on-surface font-body focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline-variant"
                  id="email"
                  placeholder="kratos@skyway.com"
                  type="email"
                />
              </div>
            </div>
            <!-- Password Field -->
            <div class="space-y-2">
              <div class="flex justify-between items-end ml-1">
                <label
                  class="text-[0.6875rem] font-bold uppercase tracking-wider text-on-surface-variant"
                  for="password"
                  >Password</label
                >
                <a
                  class="text-[0.6875rem] font-bold uppercase tracking-wider text-primary hover:text-primary-container transition-colors"
                  href="#"
                  >Forgot Password?</a
                >
              </div>
              <div class="relative">
                <input
                  class="w-full bg-surface-container-lowest border-none rounded-lg px-4 py-3.5 text-on-surface font-body focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline-variant"
                  id="password"
                  placeholder="••••••••"
                  type="password"
                />
              </div>
            </div>
            <!-- CTA Button -->
            <button
              class="w-full py-4 rounded-lg bg-gradient-to-r from-primary to-primary-container text-white font-headline font-bold text-lg hover:shadow-lg hover:shadow-primary/20 active:scale-[0.98] transition-all"
              type="button"
              id="logInBtn"
              onclick="LogInUser()"
            >
              Log In
            </button>
          </form>
          <!-- Social Logins -->
          <div class="mt-10">
            <div class="relative flex items-center mb-8">
              <div class="flex-grow border-t border-outline-variant/30"></div>
              <span
                class="flex-shrink mx-4 text-[0.6875rem] font-bold uppercase tracking-wider text-outline"
                >Or continue with</span
              >
              <div class="flex-grow border-t border-outline-variant/30"></div>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <button
                class="flex items-center justify-center gap-3 py-3 px-4 rounded-lg bg-surface-container-lowest hover:bg-surface-container-low transition-colors border border-outline-variant/10"
              >
                <svg class="w-5 h-5" viewbox="0 0 24 24">
                  <path
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                    fill="#4285F4"
                  ></path>
                  <path
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                    fill="#34A853"
                  ></path>
                  <path
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                    fill="#FBBC05"
                  ></path>
                  <path
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                    fill="#EA4335"
                  ></path>
                </svg>
                <span class="text-sm font-semibold text-on-surface"
                  >Google</span
                >
              </button>
              <button
                class="flex items-center justify-center gap-3 py-3 px-4 rounded-lg bg-surface-container-lowest hover:bg-surface-container-low transition-colors border border-outline-variant/10"
              >
                <svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
                  <path
                    d="M17.05 20.28c-.98.95-2.05 1.61-3.15 1.61-1.05 0-1.42-.66-2.72-.66-1.33 0-1.78.64-2.72.64-1.12 0-2.12-.66-3.23-1.74-2.25-2.21-2.9-6.32-1.38-8.83 1.15-1.91 3.09-3.1 5.08-3.1 1.04 0 1.9.43 2.7.43.71 0 1.83-.5 3.06-.5 1.28 0 2.47.53 3.3 1.58-2.65 1.58-2.21 5.38.5 6.55-.58 1.45-1.45 3.01-2.44 4.02zM12.03 7.25c-.1 0-.21-.01-.31-.01.12-2.31 2.05-4.24 4.36-4.24.1 0 .21.01.31.01-.12 2.31-2.05 4.24-4.36 4.24z"
                  ></path>
                </svg>
                <span class="text-sm font-semibold text-on-surface">Apple</span>
              </button>
            </div>
          </div>
          <div class="mt-10 text-center">
            <p class="text-on-surface-variant text-sm">
              New to SkyWay?
              <a
                class="text-primary font-bold ml-1 hover:underline"
                href="./signup.html"
                >Create an account</a
              >
            </p>
          </div>
        </div>
        <!-- Contextual Footer -->
        <div class="mt-8 flex justify-center gap-6">
          <a
            class="text-[0.6875rem] font-bold uppercase tracking-widest text-on-surface-variant/60 hover:text-primary transition-colors"
            href="#"
            >Privacy</a
          >
          <a
            class="text-[0.6875rem] font-bold uppercase tracking-widest text-on-surface-variant/60 hover:text-primary transition-colors"
            href="#"
            >Terms</a
          >
          <a
            class="text-[0.6875rem] font-bold uppercase tracking-widest text-on-surface-variant/60 hover:text-primary transition-colors"
            href="#"
            >Support</a
          >
        </div>
      </div>
    </main>
  </body>
</html>

<script src="./js/login.js"></script>
